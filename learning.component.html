<div>
    <div>
        <h2>Unidad Educativa San Jose</h2>
        <div>
            <h3>Curso N: {{course.id}}</h3>
        </div>
        <div>
            <h3>Nombre: {{course.name}}</h3>
        </div>
        <div>
            <h3>Estudiantes</h3>
        </div>
        <div>
            <table>
                <thead>
                    <th>| Id | </th>
                    <th> Identificacion | </th>
                    <th> Nombres | </th>
                    <th> Apellidos |</th>
                </thead>
                <tbody>
                    @for (item of course.students; track $index) {
                    <tr>
                        <td>{{item.id}}</td>
                        <td>{{item.identification}}</td>
                        <td>{{item.name}}</td>
                        <td>{{item.surname}}</td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
